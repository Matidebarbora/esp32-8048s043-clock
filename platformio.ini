; ESP32-8048S043 WiFi Clock
; Framework: ESP-IDF 5.1+  |  PlatformIO espressif32 platform 6.x+
;
; Setup:
;   1. Edit src/config.h — fill in WIFI_SSID, WIFI_PASSWORD, TIMEZONE
;   2. pio run -t upload

[env:esp32s3-clock]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
; 16 MB flash — override the board default (8 MB) to match the hardware
board_upload.flash_size = 16MB
board_build.flash_mode = qio
; Custom partition table: 7 MB app + 9 MB storage
board_build.partitions = partitions.csv
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
