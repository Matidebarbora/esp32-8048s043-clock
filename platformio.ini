; ESP32-8048S043 WiFi Clock
; Framework: ESP-IDF 5.1+  |  PlatformIO espressif32 platform 6.x+
;
; Setup:
;   1. Edit src/config.h — fill in WIFI_SSID, WIFI_PASSWORD, TIMEZONE
;   2. pio run -t upload

[env:esp32s3-clock]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
; 16 MB flash — override the board default (8 MB) to match the hardware
board_upload.flash_size = 16MB
board_build.flash_mode = qio
; Custom partition table: 7 MB app + 9 MB storage
board_build.partitions = partitions.csv
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
; Sources LVGL's internal memory pool (CONFIG_LV_MEM_SIZE_KILOBYTES, see
; sdkconfig.defaults) from PSRAM instead of a static internal-RAM array.
; History (don't re-attempt without new evidence):
;   - 128 KB as a static internal-RAM array: boot-loop, ESP_ERR_NO_MEM
;     ("no mem for bounce buffer") — starved the RGB panel's own DMA buffer.
;   - 64 KB as a static internal-RAM array (an attempt to find a smaller
;     safe-but-fast middle ground): boot hung completely after "Install RGB
;     panel driver", no error, no backtrace, nothing — worse than the 128 KB
;     failure, not better. Internal RAM is evidently tight enough on this
;     board that even a "conservative" bump here isn't safe to guess at.
;   - This PSRAM-backed pool: boots reliably, forecast screen works, only
;     downside is a mild flicker/slower feel from PSRAM's higher latency
;     (every lv_obj_t/style/render buffer lives in this pool). Accepted
;     tradeoff — stability over the last bit of snappiness.
; esp_heap_caps.h is a foundational ESP-IDF header, visible from every
; component's build (including the vendored lvgl one) — these flags apply
; globally since PlatformIO injects build_flags into the whole ESP-IDF
; build, not just this project's own component. No MALLOC_CAP_8BIT (usually
; OR'd in alongside MALLOC_CAP_SPIRAM) — the '|' is interpreted as a shell
; pipe on Windows and breaks the build; MALLOC_CAP_SPIRAM alone is enough.
build_flags =
    -DLV_MEM_POOL_INCLUDE=\"esp_heap_caps.h\"
    -DLV_MEM_POOL_ALLOC(size)=heap_caps_malloc(size,MALLOC_CAP_SPIRAM)
